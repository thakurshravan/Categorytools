<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Promotion Claims Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 30px; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: none; margin-bottom: 20px; }
        .table-responsive { max-height: 500px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="container mb-5">
        <div class="text-center mb-4">
            <h2>🎯 Brand Promotion Claims Calculator</h2>
            <p class="text-muted">Strict Date Window Matching ('From' & 'To') with Automatic Claims Aggregation</p>
        </div>

        <div class="card p-4">
            <form action="/calculate" method="post" enctype="multipart/form-data">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">1. Upload Master Sales File</label>
                        <input type="file" name="claim_sales" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">2. Upload 01 File for ACC WTC Brand</label>
                        <input type="file" name="claim_promo" class="form-control" required>
                    </div>
                </div>
                <div class="text-center mt-3">
                    <button type="submit" class="btn btn-primary btn-lg px-5">🚀 Calculate Total Qty Sales & Generate Claims</button>
                </div>
            </form>
        </div>

        {% if diagnostics %}{% endif %}
        {% if error %}{% endif %}
        {% if result %}{% endif %}
        
    </div>
</body>
</html>
